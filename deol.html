<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siralata - Punjabi AI Music Collection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header-section {
            border-bottom: 2px solid #0dcaf0;
            margin-bottom: 30px;
            padding-bottom: 15px;
            margin-top: 30px;
        }
        .player-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
        }
        .playlist-container {
            background-color: #1e1e1e;
            border-radius: 12px;
            max-height: 600px;
            overflow-y: auto;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        .list-group-item {
            background-color: #2a2a2a;
            color: #e0e0e0;
            border-color: #333;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .list-group-item:hover {
            background-color: #3a3a3a;
        }
        .list-group-item.active {
            background-color: #0dcaf0;
            color: #000;
            border-color: #0dcaf0;
            font-weight: bold;
        }
        audio {
            width: 100%;
            margin-top: 20px;
            outline: none;
        }
        /* Custom scrollbar for playlist */
        .playlist-container::-webkit-scrollbar {
            width: 8px;
        }
        .playlist-container::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        .playlist-container::-webkit-scrollbar-thumb {
            background: #0dcaf0;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row header-section">
        <div class="col-12 text-center">
            <h1 class="display-5 text-info">Siralata Collection</h1>
            <p class="lead">AI-Generated Punjabi Variations</p>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8 mb-4">
            <div class="player-container">
                <h3 id="current-track-title" class="text-info mb-4">Select a track to begin</h3>
                
                <div class="bg-dark rounded mb-4" style="height: 300px; display: flex; align-items: center; justify-content: center; border: 1px solid #333;">
                    <span class="text-muted">Audio Visualizer / Video Area</span>
                </div>

                <audio id="audio-player" controls>
                    <source src="" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="playlist-container p-2">
                <h4 class="text-center text-info my-3">Playlist</h4>
                <div class="list-group list-group-flush" id="playlist-box">
                    </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    ];

    const audioPath = "./"; // Relative path to where MP3s are stored on GitHub
    let currentIndex = 0;
    const player = document.getElementById("audio-player");
    const $playlistBox = $("#playlist-box");

    $(document).ready(function() {
        // Populate the playlist UI
        $.each(playlist, function(index, filename) {
            // Clean up name for display (remove .mp3)
            let displayName = filename.replace('.mp3', '');
            
            let $item = $("<a>", {
                text: "Track: " + displayName,
                class: "list-group-item list-group-item-action",
                "data-index": index
            });
            $playlistBox.append($item);
        });

        // Function to load and play a track
        function loadTrack(index) {
            if(index < 0 || index >= playlist.length) return;
            currentIndex = index;
            
            // Update UI
            $(".list-group-item").removeClass("active");
            let $activeItem = $(".list-group-item").eq(index);
            $activeItem.addClass("active");
            
            // Auto-scroll playlist to active item
            $playlistBox.animate({
                scrollTop: $activeItem.position().top + $playlistBox.scrollTop() - 50
            }, 200);

            // Update Player
            $("#current-track-title").text($activeItem.text());
            player.src = audioPath + playlist[index];
            player.load();
            player.play();
        }

        // Click event to play specific track
        $(".list-group-item").on("click", function() {
            let index = $(this).data("index");
            loadTrack(index);
        });

        // Sequential Playback: When track ends, play next
        $(player).on("ended", function() {
            if (currentIndex + 1 < playlist.length) {
                loadTrack(currentIndex + 1);
            }
        });
    });
</script>

</html>
