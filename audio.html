<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Debug Test</title>
    <style>
        body { background: #121212; color: #0dcaf0; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .debug-info { color: #888; font-size: 0.9em; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Testing: 0001_final_web.mp3</h1>

    <audio controls autoplay>
        <source src="0001_final_web.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div class="debug-info">
        <p>Attempting to load: <code>./Music/0001_final_web.mp3</code></p>
        <p>Ensure the "Music" folder starts with a capital <strong>M</strong> if that's how you named it!</p>
    </div>

</body>
</html>
